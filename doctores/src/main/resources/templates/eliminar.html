<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Doctor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .info { background-color: #f9f9f9; padding: 15px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 20px; }
        .btn { padding: 8px 16px; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn-red { background-color: #884A46FF; }
        .btn-gray { background-color: #9E9E9E; }
    </style>
</head>
<body>
<h1>Eliminar Doctor</h1>
<p>¿Estás seguro de que deseas eliminar al siguiente doctor?</p>
<div class="info">
    <p><strong>ID:</strong> <span th:text="${doctor.id}"></span></p>
    <p><strong>Nombre:</strong> <span th:text="${doctor.nombre}"></span></p>
    <p><strong>Especialidad:</strong> <span th:text="${doctor.especialidad}"></span></p>
    <p><strong>Teléfono:</strong> <span th:text="${doctor.telefono}"></span></p>
    <p><strong>Correo:</strong> <span th:text="${doctor.correo}"></span></p>
</div>
<form th:action="@{/doctores/eliminar/{id}(id=${doctor.id})}" method="post">
    <button class="btn btn-red" type="submit">Eliminar</button>
    <a class="btn btn-gray" th:href="@{/doctores}">Cancelar</a>
</form>
</body>
</html>
